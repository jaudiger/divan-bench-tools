name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect changed paths
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'ruff.toml'
              - 'tests/fixtures/**'
              - '.github/workflows/ci.yml'
            workflows:
              - '.github/workflows/**'

  lint-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/static-analysis-python.yml@4aef3115afe05a19785b3e14970ecd4f400cc457

  test-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/tests-python.yml@4aef3115afe05a19785b3e14970ecd4f400cc457
    with:
      python-version: "3.14"

  lint-actions:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/static-analysis-github-actions.yml@4aef3115afe05a19785b3e14970ecd4f400cc457

  ci:
    if: always()
    needs: [lint-python, test-python, lint-actions]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required checks passed
        env:
          RESULTS: ${{ toJson(needs.*.result) }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            echo "One or more required checks failed"
            exit 1
          fi
